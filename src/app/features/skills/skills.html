<section id="skills" class="section skills-section">
  <div class="skills-copy" data-aos="fade-up">
    <span class="skills-eyebrow">Core Stack</span>
    <h2 class="section-title">Skills</h2>
    <p class="skills-intro">
      A full stack toolkit built around secure Java systems, modern Angular interfaces,
      and production-focused delivery practices.
    </p>
  </div>

  <div class="skills-grid">
    <article
      class="skill-card glass"
      *ngFor="let group of skillGroups; let index = index"
      data-aos="fade-up"
      [attr.data-aos-delay]="index * 80"
    >
      <div class="skill-icon-wrap">
        <i class="{{ group.icon }} skill-icon"></i>
      </div>

      <h3>{{ group.title }}</h3>

      <div class="skill-list">
        <span *ngFor="let item of group.items">{{ item }}</span>
      </div>
    </article>
  </div>
</section>
