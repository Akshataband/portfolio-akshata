<section id="about" class="section about-section">
  <div class="about-copy" data-aos="fade-up">
    <span class="about-eyebrow">Profile</span>
    <h2 class="section-title">About Me</h2>
    <p class="about-tagline">{{ role }}</p>
  </div>

  <div class="about-layout">
    <article class="about-summary glass" data-aos="fade-right">
      <h3>Akshata Band</h3>
      <p>{{ summary }}</p>

      <div class="about-highlights">
        <div class="highlight-card" *ngFor="let item of highlights">
          <h4>{{ item.title }}</h4>
          <p>{{ item.description }}</p>
        </div>
      </div>
    </article>

    <article class="about-journey glass" data-aos="fade-left">
      <h3>Journey Snapshot</h3>

      <div class="journey-list">
        <div class="journey-item" *ngFor="let item of journey; let last = last">
          <span class="journey-dot"></span>
          <div class="journey-copy">
            <h4>{{ item.title }}</h4>
            <p>{{ item.description }}</p>
          </div>
          <span class="journey-line" *ngIf="!last"></span>
        </div>
      </div>
    </article>
  </div>
</section>
