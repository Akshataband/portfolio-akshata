<section id="projects" class="section">

  <h2 class="section-title" data-aos="fade-up">Projects</h2>

  <!-- FILTER -->
  <div class="filters">
    <button (click)="selectedFilter='all'">All</button>
    <button (click)="selectedFilter='fullstack'">Full Stack</button>
    <button (click)="selectedFilter='backend'">Backend</button>
  </div>

  <!-- PROJECT GRID -->
  <div class="projects-grid">

    <div 
      *ngFor="let project of filteredProjects"
      class="project-card glass"
      [ngClass]="{'highlight': project.highlight}"
      data-aos="fade-up"
    >

      <h3>{{project.title}}</h3>

      <p>{{project.description}}</p>

      <!-- TECH -->
      <div class="tech">
        <span *ngFor="let t of project.tech">{{t}}</span>
      </div>

      <!-- ACTION -->
      <div class="actions">
        <button class="btn-primary">GitHub</button>
        <button class="btn-primary outline">Live</button>
      </div>

    </div>

  </div>

</section>
